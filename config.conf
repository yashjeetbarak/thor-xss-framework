# Thor configuration
# Precedence: CLI arguments > THOR_* environment variables > this file > built-in defaults.

OUTPUT_DIR="results"
LOG_DIR="logs"
THREADS="50"
HTTPX_THREADS="100"
PARAMSPIDER_THREADS="20"
KATANA_DEPTH="2"
KATANA_CONCURRENCY="20"
MAX_URLCOLLECT_HOSTS="250"

ENABLE_HTTPX="true"
ENABLE_PARAMSPIDER="true"
ENABLE_GAU="true"
ENABLE_WAYMORE="true"
ENABLE_KATANA="true"
SAVE_JSON="true"
SAVE_HTML="true"
VERBOSE="false"
DEBUG="false"
SILENT="false"
RETRY="3"

# Dalfox XSS scanner options.
DALFOX_WORKERS="25"
DALFOX_TIMEOUT="8"
DALFOX_DELAY="0"
DALFOX_OUTPUT_FORMAT="plain"
DALFOX_FOLLOW_REDIRECTS="true"
DALFOX_REQUEST_METHOD="GET"
DALFOX_CUSTOM_PAYLOAD_FILE=""
# false avoids running Dalfox twice. Thor still writes normalized dalfox_result.json from the actual text run.
# Set true if you also want raw Dalfox JSON saved to dalfox_raw.json when the installed Dalfox supports JSON output.
DALFOX_SAVE_RAW_JSON="false"
DALFOX_RETRIES="1"
DALFOX_BATCH_SIZE="250"
DALFOX_PRECHECK_LIVE="true"
DALFOX_REQUIRE_LIVE_HOSTS="true"
DALFOX_SCOPE_ONLY="true"
DALFOX_MAX_TARGETS_PER_HOST="0"
DALFOX_ULIMIT="8192"
DALFOX_USE_OUTPUT_FLAG="false"

# Optional request customization for Dalfox. Leave blank unless authorized by scope.
PROXY=""
COOKIES=""
# Multiple headers can be separated with literal \n, e.g. HEADERS="X-A: 1\nX-B: 2"
HEADERS=""
USER_AGENT="Thor/1.0.0"

# Safety defaults. Thor refuses private/internal-looking domains unless explicitly allowed.
ALLOW_PRIVATE_TARGETS="false"
CLEAN_TEMP="true"
