name: Lint Bash

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Collect Bash scripts
        shell: bash
        run: |
          find . \
            -type f \
            -name '*.sh' \
            -not -path './.git/*' \
            -not -path './results/*' \
            -not -path './logs/*' \
            -not -path './tmp/*' \
            | sort > /tmp/thor-shell-scripts.txt

          echo "Scripts found:"
          cat /tmp/thor-shell-scripts.txt

      - name: Bash syntax check
        shell: bash
        run: |
          xargs -r bash -n < /tmp/thor-shell-scripts.txt

      - name: ShellCheck
        shell: bash
        run: |
          xargs -r shellcheck \
            -e SC1090 \
            -e SC1091 \
            -e SC2034 \
            -e SC2154 \
            -e SC2164 \
            -e SC2317 \
            < /tmp/thor-shell-scripts.txt
