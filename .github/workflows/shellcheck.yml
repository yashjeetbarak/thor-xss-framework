name: Lint Bash

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ShellCheck and shfmt
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Shell syntax check
        shell: bash
        run: |
          mapfile -t scripts < <(find . -type f -name '*.sh' -not -path './results/*' -not -path './logs/*')
          bash -n "${scripts[@]}"
      - name: ShellCheck
        shell: bash
        run: |
          mapfile -t scripts < <(find . -type f -name '*.sh' -not -path './results/*' -not -path './logs/*')
          shellcheck "${scripts[@]}"
      - name: shfmt check
        shell: bash
        run: |
          mapfile -t scripts < <(find . -type f -name '*.sh' -not -path './results/*' -not -path './logs/*')
          shfmt -d "${scripts[@]}"
